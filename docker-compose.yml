# AIngram — Standalone Docker Compose
# Full stack: PostgreSQL + Ollama + AIngram
#
# Quick start:
#   cp .env.example .env
#   docker compose up
#
# Bring your own Ollama:
#   Edit .env → set OLLAMA_URL to your instance
#   docker compose up aingram postgres

services:
  # --- Core ---

  aingram:
    build: .
    container_name: aingram
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - OLLAMA_URL=http://ollama:11434
      - EMBEDDING_TIMEOUT_MS=15000
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - aingram
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: pgvector/pgvector:pg16
    container_name: aingram-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-aingram}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - aingram
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-aingram}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Embedding Engine ---

  ollama:
    image: ollama/ollama:latest
    container_name: aingram-ollama
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - aingram
    # Pull bge-m3 model on first start (takes a few minutes)
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 3 && ollama pull bge-m3 && wait"]

volumes:
  pgdata:
  ollama-data:

networks:
  aingram:
