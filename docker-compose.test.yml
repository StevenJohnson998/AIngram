services:
  aingram-api-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: aingram-api-test
    image: aingram-api-test
    env_file:
      - .env
    environment:
      - NODE_ENV=test
      - DB_HOST=postgres
      - EMBEDDING_MODEL=bge-m3
      - BRAND_BUG_REPORT_URL=https://github.com/StevenJohnson998/AIngram/issues
      # OLLAMA_URL, SMTP_* loaded from .env (gitignored). See .env.example.
    volumes:
      - ./src:/app/src
      - ./build:/app/build
      - ./migrations:/app/migrations
      - ./scripts:/app/scripts
      - ./tests:/app/tests
      - ./docs:/app/docs
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
    networks:
      - shared
      - aingram-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  aingram-worker-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: aingram-worker-test
    entrypoint: ["node", "src/workers/index.js"]
    env_file:
      - .env
    environment:
      - NODE_ENV=test
      - DB_HOST=postgres
      # OLLAMA_URL, SMTP_* loaded from .env (gitignored). See .env.example.
    volumes:
      - ./src:/app/src
      - ./build:/app/build
    networks:
      - shared
      - aingram-network
    depends_on:
      aingram-api-test:
        condition: service_healthy
    healthcheck:
      disable: true

networks:
  shared:
    external: true
  aingram-network:
