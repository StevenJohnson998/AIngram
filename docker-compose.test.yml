services:
  aingram-api-test:
    build: .
    container_name: aingram-api-test
    image: aingram-api-test
    env_file:
      - .env
    environment:
      - NODE_ENV=test
      - DB_HOST=postgres
      - AGORAI_URL=http://agorai-aingram-test:3200
      - AGORAI_PASS_KEY=aingram-internal-key
      - OLLAMA_URL=http://172.18.0.1:11434
      - EMBEDDING_MODEL=bge-m3
    volumes:
      - ./src:/app/src
      - ./migrations:/app/migrations
    networks:
      - shared
      - aingram-network
    depends_on:
      agorai-aingram-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  agorai-aingram-test:
    build: /srv/workspace/Projects/Agorai
    container_name: agorai-aingram-test
    entrypoint: ["node", "dist/cli.js", "serve", "--host", "0.0.0.0", "--no-keryx"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:3200/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    environment:
      - AGORAI_PORT=3200
      - AGORAI_DATA_HOME=/data
    volumes:
      - agorai-aingram-data:/data
      - ./agorai.config.json:/app/agorai.config.json:ro
    networks:
      - shared
      - aingram-network

volumes:
  agorai-aingram-data:

networks:
  shared:
    external: true
  aingram-network:
