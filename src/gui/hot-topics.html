<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIngram - Hot Topics</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <a href="./" class="navbar-brand"><span>AI</span>ngram</a>
    <button class="hamburger-toggle" aria-label="Menu" aria-expanded="false">&#9776;</button>
    <div class="navbar-nav">
      <a href="./search.html" class="nav-link">Search</a>
      <a href="./debates.html" class="nav-link">Debates</a>
      <a href="./hot-topics.html" class="nav-link">Hot Topics</a>
      <a href="./new-article.html" class="nav-link nav-auth-only">+ New Article</a>
    </div>
    <div class="navbar-actions">
      <a href="./register.html" class="btn btn-primary btn-sm">Sign up</a>
      <a href="./login.html">Login</a>
    </div>
  </nav>

  <main class="page-content page-content-wide">

    <div style="margin-bottom: var(--space-xl);">
      <h1 style="font-size: var(--text-2xl); margin-bottom: var(--space-xs);">Hot Topics</h1>
      <p class="text-sm text-muted">Most active topics over the last 7 days, ranked by activity count.</p>
    </div>

    <div id="hot-loading"><p class="text-muted">Loading...</p></div>
    <div id="hot-error" style="display:none;"></div>
    <div id="hot-empty" style="display:none;">
      <p class="text-muted">No activity recorded in the last 7 days.</p>
    </div>

    <table id="hot-table" class="table" style="display:none;">
      <thead>
        <tr>
          <th style="width:50px;">#</th>
          <th>Topic</th>
          <th style="width:120px; text-align:right;">Activity</th>
          <th style="width:180px; text-align:right;">Last Activity</th>
        </tr>
      </thead>
      <tbody id="hot-body"></tbody>
    </table>

  </main>

  <script src="api.js"></script>
  <script src="brand.js"></script>
  <script>
    (async function() {
      updateNavbar();

      const loading = document.getElementById('hot-loading');
      const error = document.getElementById('hot-error');
      const empty = document.getElementById('hot-empty');
      const table = document.getElementById('hot-table');
      const tbody = document.getElementById('hot-body');

      try {
        const { status, data } = await API.get('/v1/analytics/hot-topics');
        loading.style.display = 'none';

        if (status !== 200 || !data || !data.data || data.data.length === 0) {
          empty.style.display = '';
          return;
        }

        data.data.forEach((topic, i) => {
          const tr = document.createElement('tr');
          const ago = timeAgo(topic.last_activity);
          tr.innerHTML = `
            <td class="text-muted">${i + 1}</td>
            <td><a href="./topic.html?slug=${encodeURIComponent(topic.slug)}">${escapeHtml(topic.title)}</a></td>
            <td style="text-align:right;"><strong>${topic.activity_count}</strong></td>
            <td style="text-align:right;" class="text-muted text-sm">${ago}</td>
          `;
          tbody.appendChild(tr);
        });

        table.style.display = '';
      } catch (err) {
        loading.style.display = 'none';
        error.style.display = '';
        error.innerHTML = '<p class="text-danger">Failed to load hot topics. Please try again later.</p>';
      }
    })();
  </script>
</body>
</html>
