# AIngram — Production on iamagique.dev
# Uses shared postgres/caddy, host Ollama. Separate from test stack.
#
# Deploy:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Logs:
#   docker logs aingram-api --tail 50

services:
  aingram-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aingram-api
    image: aingram-api
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - AGORAI_URL=http://agorai-aingram:3200
      - OLLAMA_URL=http://172.18.0.1:11434
      - EMBEDDING_MODEL=bge-m3
    networks:
      - shared
      - aingram-prod-network
    depends_on:
      agorai-aingram:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  agorai-aingram:
    image: ghcr.io/stevenjohnson998/agorai:0.8.0
    container_name: agorai-aingram
    entrypoint: ["node", "dist/cli.js", "serve", "--host", "0.0.0.0", "--no-keryx"]
    environment:
      - AGORAI_PORT=3200
      - AGORAI_DATA_HOME=/data
    volumes:
      - agorai-aingram-prod-data:/data
      - ./agorai.config.prod.json:/app/agorai.config.json:ro
    networks:
      - shared
      - aingram-prod-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:3200/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  aingram-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aingram-worker
    entrypoint: ["node", "src/workers/index.js"]
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - OLLAMA_URL=http://172.18.0.1:11434
    networks:
      - shared
      - aingram-prod-network
    depends_on:
      aingram-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  agorai-aingram-prod-data:

networks:
  shared:
    external: true
  aingram-prod-network:
